<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon Games | Portfolio Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { display: flex; background-color: #0f172a; color: #f8fafc; }

        /* Sidebar */
        nav {
            width: 250px; height: 100vh; background-color: #1e293b;
            position: fixed; padding: 2rem 1rem; display: flex;
            flex-direction: column; border-right: 1px solid #334155;
        }
        .logo { font-size: 1.2rem; font-weight: bold; color: #38bdf8; margin-bottom: 3rem; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        nav a {
            text-decoration: none; color: #94a3b8; padding: 1rem;
            margin-bottom: 0.5rem; border-radius: 8px; transition: 0.3s;
            display: flex; align-items: center; gap: 10px;
        }
        nav a:hover { background-color: #334155; color: #38bdf8; }

        /* Main Content */
        main { margin-left: 250px; padding: 3rem; width: 100%; }
        .hero { margin-bottom: 4rem; }
        h1 { font-size: 3rem; margin-bottom: 1rem; }
        .highlight { color: #38bdf8; }

        /* Grid de Projetos */
        #repos-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .repo-card {
            background: #1e293b;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #334155;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .repo-card:hover { transform: translateY(-5px); border-color: #38bdf8; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .repo-card h3 { color: #38bdf8; margin-bottom: 0.5rem; text-transform: capitalize; }
        .repo-card p { font-size: 0.9rem; color: #94a3b8; margin-bottom: 1.5rem; height: 40px; overflow: hidden; }
        .repo-stats { display: flex; gap: 15px; font-size: 0.8rem; color: #64748b; align-items: center; }

        @media (max-width: 768px) {
            nav { width: 70px; } nav a span { display: none; }
            .logo { font-size: 0.8rem; }
            main { margin-left: 70px; padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Horizon Games</div>
        <a href="#"><i class="fas fa-home"></i> <span>Home</span></a>
        <a href="https://github.com/HorizonGamesBR" target="_blank"><i class="fab fa-github"></i> <span>GitHub</span></a>
        <a href="#projetos"><i class="fas fa-code"></i> <span>Projetos</span></a>
    </nav>

    <main>
        <section class="hero">
            <h1>Horizon <span class="highlight">Games</span></h1>
            <p>Desenvolvendo o futuro dos jogos Sandbox e simuladores de alta performance.</p>
        </section>

        <section id="projetos">
            <h2 style="color: #f8fafc; border-left: 4px solid #38bdf8; padding-left: 15px;">Portfólio da Empresa</h2>
            <div id="repos-container">Conectando ao servidor da Horizon Games...</div>
        </section>
    </main>

    <script>
        async function getRepos() {
            const container = document.getElementById('repos-container');
            try {
                // AGORA BUSCA DO SEU NOVO PERFIL: HorizonGamesBR
                const response = await fetch('https://api.github.com/users/HorizonGamesBR/repos?sort=updated');
                const repos = await response.json();

                if (!Array.isArray(repos)) {
                    throw new Error("Erro ao carregar dados");
                }

                container.innerHTML = ''; 

                repos.forEach(repo => {
                    // Filtra para não mostrar o repositório do próprio site se você não quiser
                    if (repo.name !== 'ArthurDev-Web-Site') {
                        const card = document.createElement('div');
                        card.className = 'repo-card';
                        card.innerHTML = `
                            <div>
                                <h3>${repo.name.replace(/-/g, ' ')}</h3>
                                <p>${repo.description || "Projeto oficial da Horizon Games Company."}</p>
                            </div>
                            <div class="repo-stats">
                                <span><i class="fas fa-circle" style="color: #38bdf8"></i> ${repo.language || 'Unity/C#'}</span>
                                <span><i class="fas fa-star"></i> ${repo.stargazers_count}</span>
                                <a href="${repo.html_url}" target="_blank" style="color: #38bdf8; text-decoration: none; margin-left: auto; font-weight: bold;">ABRIR <i class="fas fa-external-link-alt"></i></a>
                            </div>
                        `;
                        container.appendChild(card);
                    }
                });
            } catch (error) {
                container.innerHTML = '<p>Erro ao carregar repositórios. O CEO precisa verificar a conexão da Horizon Games!</p>';
                console.error(error);
            }
        }

        getRepos();
    </script>
</body>
</html>
